name: Deploy to GitHub Pages

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-src

      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev
          path: dev-src

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build main
        working-directory: main-src
        run: |
          npm install
          npm run build

      - name: Build dev
        working-directory: dev-src
        run: |
          npm install
          npx vite build --base=/trellospoke/dev/

      - name: Combine builds
        run: |
          mkdir -p dist
          cp -r main-src/dist/* dist/
          mkdir -p dist/dev
          cp -r dev-src/dist/* dist/dev/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
