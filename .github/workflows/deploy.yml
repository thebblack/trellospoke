name: Deploy to GitHub Pages

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build main branch
        run: |
          npm install
          npm run build
          mv dist dist-main

      - uses: actions/checkout@v4
        with:
          ref: dev
          clean: false
      - name: Build dev branch
        run: |
          npm install
          npm run build -- --base=/trellospoke/dev/
          mkdir -p dist-main/dev
          cp -r dist/* dist-main/dev/

      - name: Prepare final dist
        run: mv dist-main dist

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
